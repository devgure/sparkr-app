version: '3.8'
services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: sparkr
      POSTGRES_USER: sparkr
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://sparkr:password@postgres:5432/sparkr
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_key
      STRIPE_SECRET_KEY: sk_test_...
      STRIPE_WEBHOOK_SECRET: whsec_...
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s

  ai-service:
  build: 
    context: ./ai-service
    dockerfile: Dockerfile
  ports:
    - "8000:8000"
  environment:
    - MODEL_PATH=/app/model/compatibility_model.pkl
    - PYTHONUNBUFFERED=1
  depends_on:
    backend:
      condition: service_healthy
  volumes:
    - ./ai-service:/app
    - ./ai-service/model:/app/model
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    interval: 30s
    timeout: 10s
    retries: 3

  web:
    build: ./web
    ports:
      - "3002:3000"
    depends_on:
      - backend

  admin:
    build: ./admin
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:

  postgres_data:

